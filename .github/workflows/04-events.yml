name: 04-events

on:
  issues:
    types: [opened, reopened]
  issue_comment:
    types: [created]

jobs:
  inspect-event:
    runs-on: ubuntu-24.04
    permissions:
      issues: write
    steps:
      - name: Show event
        run: |
          echo "Event ${{ toJson(github.event) }}"
          echo "Action: ${{ github.event.action }}"
          echo "Issue Number: ${{ github.event.issue.number }}"

      # - name: comentar como bot en Github Actions
      #   if: github.event_name == 'issues' && github.event.action == 'opened'
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #     ISSUE_NUMBER: ${{ github.event.issue.number }}
      #     GITHUB_REPOSITORY: ${{ github.repository }}
      #   run: gh issue comment $ISSUE_NUMBER --repo $GITHUB_REPOSITORY --body "¡Hola! Este comentario fue generado automáticamente por un workflow de GitHub Actions."

      - name: comentar como autor en Github Actions
        if: github.event_name == 'issues' && github.event.action == 'opened'
        env:
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          if [ -z "$PERSONAL_ACCESS_TOKEN" ]; then
            echo "No hay Personal Access Token configurado" >&2
            exit 1
          fi

          gh issue comment ${{ github.event.issue.number }} --body "Hola ! soy el autor del repositorio !" --author "${{ github.actor }}"
